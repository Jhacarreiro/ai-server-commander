name: Feature request
description: Propose a narrowly scoped improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operational problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain REST/MCP parity and security implications.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: principles
    attributes:
      label: Design checks
      options:
        - label: The capability can be implemented in shared core code.
        - label: The proposal does not rely on `SAFE_MODE` as a sandbox.
        - label: I have considered authentication, permissions and audit behavior.
